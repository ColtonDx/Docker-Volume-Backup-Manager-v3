services:
  backup-buddy:
    build: .
    container_name: backup-buddy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Required: Docker socket so we can manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data (SQLite database)
      - backup-buddy-data:/data
      # Temp directory for building archives before upload
      - backup-buddy-temp:/backups
      # Optional: local backup storage directory
      - ./local-backups:/local-backups
      # Optional: mount your rclone config
      # - ~/.config/rclone:/root/.config/rclone:ro
    environment:
      # REQUIRED: Set a password for the web UI
      - BACKUP_BUDDY_PASSWORD=changeme
      # Optional: custom JWT secret (auto-generated if not set)
      # - JWT_SECRET=my-super-secret-key
      # Optional: Docker label key to match jobs to containers
      # - DOCKER_LABEL_KEY=backup-buddy.job
      # Optional: rclone settings
      # - RCLONE_CONFIG_PATH=/root/.config/rclone/rclone.conf
      # - RCLONE_BINARY=/usr/bin/rclone

volumes:
  backup-buddy-data:
  backup-buddy-temp:
