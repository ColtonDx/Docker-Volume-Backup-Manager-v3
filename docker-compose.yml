services:
  docker-volume-backup-manager:
    image: coltondx/docker-volume-backup-manager-v3:latest
    container_name: docker-volume-backup-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Required: Docker socket so we can manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data (SQLite database + auto-generated TLS certs)
      - data:/data
      # Temp directory for building archives before upload
      - temp:/backups
      # Optional: local backup storage directory
      - ./local-backups:/local-backups
      # Optional: mount your rclone config
      # - ~/.config/rclone:/root/.config/rclone:ro
    environment:
      # REQUIRED: Set a password for the web UI
      - APP_PASSWORD=changeme

      # Optional: custom instance name shown in the sidebar
      # - APP_NAME=Docker Volume Backup Manager

      # Optional: custom JWT secret (strongly recommended in production)
      # - JWT_SECRET=my-super-secret-key

      # Optional: Docker label key to match jobs to containers
      # - DOCKER_LABEL_KEY=dvbm.job

      # Optional: rclone settings
      # - RCLONE_CONFIG=/root/.config/rclone/rclone.conf
      # - RCLONE_BINARY=/usr/bin/rclone

      # ── Backup concurrency ────────────────────────────────────────────────
      # Maximum number of backup/restore jobs that run simultaneously.
      # Default is 1 (sequential). Jobs that would exceed this limit wait in a
      # thread queue until a slot is free. Increase only if all jobs target
      # completely separate containers with no shared volumes.
      # - MAX_CONCURRENT_BACKUPS=1

      # ── Database at-rest encryption (SQLCipher / AES-256) ─────────────────
      # When set, the SQLite database is encrypted on disk.
      # On first start with this key, an existing plaintext database is
      # automatically migrated (backup saved as dvbm.db.plaintext.bak).
      # WARNING: if you lose or change this key the database becomes unreadable.
      # - DB_ENCRYPTION_KEY=replace-with-a-strong-random-passphrase

      # ── Allowed hosts / CORS ──────────────────────────────────────────────
      # Restrict which Host header values are accepted (default: any).
      # Include every hostname/IP used to reach this container, e.g.:
      #   ALLOWED_HOSTS=myhost.example.com,localhost
      # - ALLOWED_HOSTS=*
      #
      # Restrict CORS origins (default: any).
      #   ALLOWED_ORIGINS=https://myhost.example.com
      # - ALLOWED_ORIGINS=*

      # ── HTTPS / TLS ───────────────────────────────────────────────────────
      # Enabled by default. A self-signed cert is generated on first start
      # and stored in /data/certs (persisted in the data volume).
      # Access the UI at https://localhost:8000 and accept the cert warning,
      # or import /data/certs/cert.pem into your OS/browser trust store.
      #
      # Disable TLS (plain HTTP):
      # - SSL_ENABLED=false
      #
      # Use a custom cert (e.g. from Let's Encrypt via a bind-mount):
      # - SSL_CERT_FILE=/data/certs/fullchain.pem
      # - SSL_KEY_FILE=/data/certs/privkey.pem

volumes:
  data:
  temp:
